name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Sincronizar versão com a tag
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "Versão atualizada para $tag"

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build -- --publish never

      - name: Criar release e subir arquivos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag --title $tag --notes "Release $tag" || true
          gh release upload $tag "release\latest.yml" --clobber
          Get-ChildItem release -Filter "*.exe" | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }
          Get-ChildItem release -Filter "*.blockmap" | ForEach-Object {
            gh release upload $tag $_.FullName --clobber
          }
