name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Build e publicar release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build -- --publish always
