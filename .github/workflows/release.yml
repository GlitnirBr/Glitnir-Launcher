name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Sincronizar versão com a tag
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = $tag
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          Write-Host "Versão atualizada para $tag"

      - name: Instalar dependências
        run: npm ci

      - name: Build e publicar release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always

      - name: Listar arquivos gerados
        run: Get-ChildItem release -Name
